# TiMem Migration Docker Compose Configuration
#
# Services for running database migrations:
#   ✅ PostgreSQL - Primary database
#   ✅ Qdrant - Vector database
#
networks:
  timem_network:
    driver: bridge

services:
  postgres:
    container_name: timem_demo_postgres
    environment:
      POSTGRES_DB: timem_db
      POSTGRES_USER: ${POSTGRES_USER:-timem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timem_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD-SHELL
      - pg_isready -U timem_user -d timem_db
      timeout: 10s
    image: postgres:15-alpine
    networks:
    - timem_network
    ports:
    - 15432:5432
    restart: unless-stopped
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

  qdrant:
    container_name: timem_demo_qdrant
    environment:
    - QDRANT__SERVICE__HTTP_PORT=6333
    - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 40s
      test:
      - CMD-SHELL
      - test -f /qdrant/.qdrant-initialized || exit 1
      timeout: 10s
    image: qdrant/qdrant:latest
    networks:
    - timem_network
    ports:
    - 16333:6333
    - 16334:6334
    restart: unless-stopped
    volumes:
    - qdrant_data:/qdrant/storage
    - ./docker/qdrant/config.yaml:/qdrant/config/config.yaml:ro

volumes:
  postgres_data: null
  qdrant_data: null
