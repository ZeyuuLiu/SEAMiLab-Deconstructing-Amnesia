# TiMem PostgreSQL Configuration
# Optimized for full-text search and memory storage

# Connection configuration
listen_addresses = '*'
port = 5432
max_connections = 300  # Engineering-level optimization: increased from 200 to 300 (supports higher concurrency)

# Memory configuration 
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 256MB

# Full-text search optimization
default_text_search_config = 'timem_config'

# Performance configuration
random_page_cost = 1.1  # SSD optimization
seq_page_cost = 1.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# Logging configuration
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_messages = warning
log_min_error_statement = error

# WAL configuration
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Full-text search specific configuration
gin_pending_list_limit = 4MB  # GIN index optimization

# Statistics collection
track_activities = on
track_counts = on
track_functions = pl

# Timezone
timezone = 'UTC'
log_timezone = 'UTC'

# JSON/JSONB optimization
max_locks_per_transaction = 256
